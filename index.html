<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="Rock-paper-Scissors.css">
    </head> 
    <body>
        <p class="size"> Rock Paper Scissors</p>
        
        <button class="btn"  onclick="
                playGame('Rock');
                ">
                <img class="img"  src="images/rock-emoji.png" alt=""/>
            </button>
            
            <button class="btn" onclick="
                playGame('Paper');
                ">
                <img class="img" src="images/Paper-emoji.png">
            </button>
            
            
            <button class="btn"  onclick="
                playGame('Scissors');
                
                ">
                <img class="img"  src="images/scissors-emoji.png">
            </button>
            <p class="js-result result"></p>
            <p class="js-move move"> </p>
            <p class=" js-score score"></p>
            <button   class="reset-btn"
            onclick="
                score.Wins = 0;
                score.Losses = 0;
                score.Ties = 0;
                localStorage.removeItem('score');
                updateScore();
                ">
                Reset Score
            </button>
            
            <script src="Rock-Paper-Scissors.js">
                
            </script>
            
        </body>
        </html>
